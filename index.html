<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historias oscuras</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/typeit@8.7.1/dist/index.umd.js"></script>
</head>
<body>

    <h1 id="titulo">Elige entre los 4 valerosos protagonistas, objetos y lugares y crea tu propia historia.</h1>
    <script>
        new TypeIt("#titulo",{
            speed: 50,
            waitUntilVisible: true 
        }).go();
    </script>

    <div class="contenedor">

        <div class="selector">
            <label>Personaje:</label>
            <select id="personajeSelect"></select>
        </div>

        <div class="selector">
            <label>Artefactos:</label>
            <select id="artefactoSelect"></select>
        </div>

        <div class="selector">
            <label>Localización:</label>
            <select id="localizacionSelect"></select>
        </div>

        <button id="btnGenerar">Generar historia</button>

        <div id="resultado" class="historia">
            <div id="hero"></div>
        </div>
        
    </div>

    <script src="js/personajes.js"></script>
    <script src="js/historias.js"></script>
    <script src="js/scripts.js"></script>

</body>
</html>
